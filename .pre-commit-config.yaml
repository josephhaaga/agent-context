repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyre-check
        name: pyre type check
        entry: uv run pyre check
        language: system
        pass_filenames: false
        stages: [pre-push]
